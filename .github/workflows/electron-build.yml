name: Build Electron WinUnpacked
on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build win-unpacked
        run: npx electron-builder build --win dir --x64

      - name: Upload win-unpacked
        uses: actions/upload-artifact@v4
        with:
          name: GestionExpedientes-Electron-WinUnpacked
          path: dist/win-unpacked/
