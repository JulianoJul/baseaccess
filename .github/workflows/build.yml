name: Build

on:
  push:
    branches: [master, wails-migration]
  workflow_dispatch:

jobs:
  wails:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact-name: GestionExpedientes-Wails-Linux
            upload-path: build/bin/GestionExpedientes
          - os: windows-latest
            artifact-name: GestionExpedientes-Wails-Windows
            upload-path: build/bin/

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build Wails (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: wails build -platform linux/amd64

      - name: Cache WebView2 Fixed Runtime (Windows)
        id: cache-webview-wails
        if: matrix.os == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: Microsoft.WebView2.FixedVersionRuntime.150.0.4078.65.x64
          key: wails-webview2-v150

      - name: Download & extract WebView2 fixed runtime (Windows)
        if: matrix.os == 'windows-latest' && steps.cache-webview-wails.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $cab = "Microsoft.WebView2.FixedVersionRuntime.150.0.4078.65.x64.cab"
          $dir = "Microsoft.WebView2.FixedVersionRuntime.150.0.4078.65.x64"
          if (Test-Path $dir) {
            Write-Host "WebView2 runtime already present"
          } else {
            if (-not (Test-Path $cab)) {
              Write-Host "Downloading WebView2 fixed runtime..."
              curl.exe -fSL -o $cab "https://msedge.sf.dl.delivery.mp.microsoft.com/filestreamingservice/files/c00b9782-0422-4114-be27-8eec079b394d/Microsoft.WebView2.FixedVersionRuntime.150.0.4078.65.x64.cab"
            }
            if (Test-Path $cab) {
              Write-Host "Extracting $cab ..."
              $tmpDir = "$env:TEMP\wv2tmp"
              New-Item -ItemType Directory -Force -Path $tmpDir | Out-Null
              expand $cab -F:* $tmpDir
              $inner = Join-Path $tmpDir $dir
              if (Test-Path $inner) {
                New-Item -ItemType Directory -Force -Path $dir | Out-Null
                Move-Item -Path "$inner\*" -Destination $dir -Force
                Remove-Item -Recurse -Force $tmpDir
              } else {
                Move-Item -Path "$tmpDir\*" -Destination $dir -Force
              }
              Write-Host "Extracted to $dir"
              Remove-Item -Force $cab
            } else {
              Write-Host "ERROR: WebView2 download failed"
              exit 1
            }
          }

      - name: Build Wails (Windows)
        if: matrix.os == 'windows-latest'
        run: wails build -platform windows/amd64 -webview2 embed

      - name: Copy WebView2 runtime alongside binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Copy-Item -Recurse "Microsoft.WebView2.FixedVersionRuntime.150.0.4078.65.x64" -Destination "build/bin/"

      - name: Upload Wails artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: build/bin/GestionExpedientes

      - name: Upload Wails artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: build/bin/
