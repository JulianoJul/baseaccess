{{define "ui_card"}}
<div class="card {{.extra_cls}}"{{if .id}} id="{{.id}}"{{end}}>
  {{if .title}}
  <h4 class="legend {{if .title_color}}legend-{{.title_color}}{{end}}">
    {{- if .icon}}<i class="{{.icon}} mr-1"></i>{{end}}
    {{- .title}}
  </h4>
  {{end}}
  {{.rendered_content}}
</div>
{{end}}

{{define "ui_empty_state"}}
<div class="text-center py-12 text-gray-500">
  {{if .icon}}<i class="{{.icon}} text-3xl mb-3 block"></i>{{end}}
  <p class="text-sm">{{.message}}</p>
</div>
{{end}}
