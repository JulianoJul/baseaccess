<div class="modal-body space-y-6 overflow-y-auto max-h-[75vh]">
    <input type="hidden" id="f-id_valuacion" name="id_valuacion" value="{{if .Registro}}{{rowGetStr .Registro "id_valuacion"}}{{end}}">

    <fieldset class="card">
        <legend class="legend legend-teal"><i class="fas fa-clipboard-list mr-1"></i> Información General</legend>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-3">
            <div><label class="label">Documento</label><input type="text" id="f-documento" name="documento" class="input" value="{{if .Registro}}{{rowGetStr .Registro "documento"}}{{end}}"></div>
            <div>
                <label class="label">Gerencia</label>
                <select id="f-id_gerencia" name="id_gerencia" class="input" onchange="cargarSuperintendencias()">
                    <option value=""></option>
                    {{if .Catalogs}}{{range .Catalogs.gerencia}}
                    <option value="{{.ID}}" {{if $.Registro}}{{if isSelected .ID (rowGetStr $.Registro "id_gerencia")}}selected{{end}}{{end}}>{{.Nombre}}</option>
                    {{end}}{{end}}
                </select>
            </div>
            <div>
                <label class="label">Superintendencia</label>
                <select id="f-id_superintendencia" name="id_superintendencia" class="input">
                    <option value=""></option>
                    {{if .Catalogs}}{{range .Catalogs.superintendencia}}
                    <option value="{{.ID}}" data-id-gerencia="{{.IDGerencia}}" {{if $.Registro}}{{if isSelected .ID (rowGetStr $.Registro "id_superintendencia")}}selected{{end}}{{end}}>{{.Nombre}}</option>
                    {{end}}{{end}}
                </select>
            </div>
            <div><label class="label">SOLPED</label><input type="text" id="f-solped" name="solped" class="input" value="{{if .Registro}}{{rowGetStr .Registro "solped"}}{{end}}"></div>
            <div><label class="label">Nro. Proceso</label><input type="text" id="f-nro_proceso" name="nro_proceso" class="input" value="{{if .Registro}}{{rowGetStr .Registro "nro_proceso"}}{{end}}"></div>
            <div><label class="label">Nro. Proforma</label><input type="text" id="f-nro_proforma" name="nro_proforma" class="input" value="{{if .Registro}}{{rowGetStr .Registro "nro_proforma"}}{{end}}"></div>
            <div class="md:col-span-2 lg:col-span-3">
                <label class="label">Descripción del Proceso</label>
                <textarea id="f-descripcion_proceso" name="descripcion_proceso" rows="2" class="input">{{if .Registro}}{{rowGetStr .Registro "descripcion_proceso"}}{{end}}</textarea>
            </div>
        </div>
    </fieldset>

    <fieldset class="card">
        <legend class="legend legend-amber"><i class="fas fa-coins mr-1"></i> Costos y Montos</legend>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-3">
            <div><label class="label">Presupuesto Base (Bs)</label><input type="text" inputmode="decimal" id="f-presupuesto_base_bs" name="presupuesto_base_bs" class="input" onblur="this.value=formatNum(this.value)" value="{{if .Registro}}{{formatNum (rowGet .Registro "presupuesto_base_bs")}}{{end}}"></div>
            <div><label class="label">Presupuesto Base (USD)</label><input type="text" inputmode="decimal" id="f-presupuesto_base_usd" name="presupuesto_base_usd" class="input" onblur="this.value=formatNum(this.value)" value="{{if .Registro}}{{formatNum (rowGet .Registro "presupuesto_base_usd")}}{{end}}"></div>
            <div><label class="label">Monto Valuación</label><input type="text" inputmode="decimal" id="f-monto_valuacion" name="monto_valuacion" class="input" onblur="this.value=formatNum(this.value)" value="{{if .Registro}}{{formatNum (rowGet .Registro "monto_valuacion")}}{{end}}"></div>
            <div><label class="label">Monto Adjudicado (Bs)</label><input type="text" inputmode="decimal" id="f-monto_adjudicado_bs" name="monto_adjudicado_bs" class="input" onblur="this.value=formatNum(this.value)" value="{{if .Registro}}{{formatNum (rowGet .Registro "monto_adjudicado_bs")}}{{end}}"></div>
            <div><label class="label">Monto Adjudicado (USD)</label><input type="text" inputmode="decimal" id="f-monto_adjudicado_usd" name="monto_adjudicado_usd" class="input" onblur="this.value=formatNum(this.value)" value="{{if .Registro}}{{formatNum (rowGet .Registro "monto_adjudicado_usd")}}{{end}}"></div>
        </div>
    </fieldset>

    <fieldset class="card">
        <legend class="legend legend-blue"><i class="fas fa-file-contract mr-1"></i> Trazabilidad, Adjudicación y Firmas</legend>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-3">
            <div>
                <label class="label">Emisor</label>
                <select id="f-id_emisor" name="id_emisor" class="input">
                    <option value=""></option>
                    {{if .Catalogs}}{{range .Catalogs.responsables}}
                    <option value="{{.ID}}" {{if $.Registro}}{{if isSelected .ID (rowGetStr $.Registro "id_emisor")}}selected{{end}}{{end}}>{{.Nombre}}</option>
                    {{end}}{{end}}
                </select>
            </div>
            <div>
                <label class="label">Receptor</label>
                <select id="f-id_receptor" name="id_receptor" class="input">
                    <option value=""></option>
                    {{if .Catalogs}}{{range .Catalogs.responsables}}
                    <option value="{{.ID}}" {{if $.Registro}}{{if isSelected .ID (rowGetStr $.Registro "id_receptor")}}selected{{end}}{{end}}>{{.Nombre}}</option>
                    {{end}}{{end}}
                </select>
            </div>
            <div>
                <label class="label">Estatus Detalle</label>
                <select id="f-id_estatus" name="id_estatus" class="input">
                    <option value=""></option>
                    {{if .Catalogs}}{{range .Catalogs.estatus_detalle}}
                    <option value="{{.ID}}" {{if $.Registro}}{{if isSelected .ID (rowGetStr $.Registro "id_estatus")}}selected{{end}}{{end}}>{{.Nombre}}</option>
                    {{end}}{{end}}
                </select>
            </div>
            <div>
                <label class="label">Empresa Adjudicada</label>
                <select id="f-id_empresa" name="id_empresa" class="input">
                    <option value=""></option>
                    {{if .Catalogs}}{{range .Catalogs.empresas}}
                    <option value="{{.ID}}" {{if $.Registro}}{{if isSelected .ID (rowGetStr $.Registro "id_empresa")}}selected{{end}}{{end}}>{{.Nombre}}</option>
                    {{end}}{{end}}
                </select>
            </div>
            <div><label class="label">Nro. Contrato SICAC</label><input type="text" id="f-nro_contrato_sicac" name="nro_contrato_sicac" class="input" value="{{if .Registro}}{{rowGetStr .Registro "nro_contrato_sicac"}}{{end}}"></div>
            <div><label class="label">Nro. Contrato SAP</label><input type="text" id="f-nro_contrato_sap" name="nro_contrato_sap" class="input" value="{{if .Registro}}{{rowGetStr .Registro "nro_contrato_sap"}}{{end}}"></div>
            <div><label class="label">Tiempo Ejecución</label><input type="text" id="f-tiempo_ejecucion" name="tiempo_ejecucion" class="input" value="{{if .Registro}}{{rowGetStr .Registro "tiempo_ejecucion"}}{{end}}"></div>
            <div><label class="label">Período Valuación Desde</label><input type="date" id="f-periodo_valuacion_desde" name="periodo_valuacion_desde" class="input" value="{{if .Registro}}{{rowGetStr .Registro "periodo_valuacion_desde"}}{{end}}"></div>
            <div><label class="label">Período Valuación Hasta</label><input type="date" id="f-periodo_valuacion_hasta" name="periodo_valuacion_hasta" class="input" value="{{if .Registro}}{{rowGetStr .Registro "periodo_valuacion_hasta"}}{{end}}"></div>
            <div><label class="label">Fecha Recibido</label><input type="date" id="f-fecha_recibido" name="fecha_recibido" class="input" value="{{if .Registro}}{{rowGetStr .Registro "fecha_recibido"}}{{end}}"></div>
            <div><label class="label">Fecha Devuelto</label><input type="date" id="f-fecha_devuelto" name="fecha_devuelto" class="input" value="{{if .Registro}}{{rowGetStr .Registro "fecha_devuelto"}}{{end}}"></div>
        </div>
    </fieldset>

    <fieldset class="card">
        <legend class="legend legend-purple"><i class="fas fa-pencil-alt mr-1"></i> Observaciones</legend>
        <div class="mt-3"><label class="label">Observaciones</label><textarea id="f-observaciones" name="observaciones" rows="2" class="input">{{if .Registro}}{{rowGetStr .Registro "observaciones"}}{{end}}</textarea></div>
        <div class="mt-2"><label class="label">Notas</label><textarea id="f-notas" name="notas" rows="2" class="input">{{if .Registro}}{{rowGetStr .Registro "notas"}}{{end}}</textarea></div>
    </fieldset>
</div>

<div class="sticky bottom-0 bg-gray-800 border-t border-gray-700 rounded-b-xl p-4 flex flex-wrap justify-end gap-3">
    <button type="button" onclick="cerrarFormulario()" class="btn btn-secondary">Cancelar</button>
    {{if .Registro}}
    <button type="button" id="btn-eliminar"
            hx-post="/api/eliminar-expediente?modulo=valuaciones"
            hx-include="#f-id_valuacion"
            hx-confirm="¿Confirmar eliminación final de la valuación #{{rowGetStr .Registro "id_valuacion"}}?"
            hx-swap="none"
            hx-on::after-request="if(event.detail.successful) { toast('Registro eliminado', 'success'); cerrarFormulario(); location.reload(); } else { alert('Error al eliminar'); }"
            class="btn btn-danger">Eliminar</button>
    {{end}}
    <button type="button"
            hx-post="/api/guardar-expediente?modulo=valuaciones"
            hx-include="#form-expediente"
            hx-swap="none"
            hx-on::after-request="if(event.detail.successful) { toast('Registro guardado', 'success'); cerrarFormulario(); location.reload(); } else { alert(JSON.parse(event.detail.xhr.responseText).error || 'Error al guardar'); }"
            class="btn btn-primary btn-lg">Guardar</button>
</div>
